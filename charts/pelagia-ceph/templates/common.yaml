---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pelagia-lcmconfig
  namespace: {{ template "release.namespace" . }}
  labels:
{{ include "chart.labels" . | indent 4 }}
data:
  ROOK_NAMESPACE: {{ .Values.lcmConfig.rookNamespace }}
  GATEWAY_API_ENABLED: {{ .Values.lcmConfig.gatewayAPIEnabled | quote }}
  {{- if (.Values.lcmConfig.gatewayAPIEnabled) }}
    {{- if (.Values.lcmConfig.gatewayName)}}
  GATEWAY_BASE_NAME: {{ .Values.lcmConfig.gatewayName }}
    {{- end }}
    {{- if (.Values.lcmConfig.gatewayNamespace)}}
  GATEWAY_BASE_NAMESPACE: {{ .Values.lcmConfig.gatewayNamespace }}
    {{- end }}
  {{- end }}
  {{- if (.Values.lcmConfig.useIngress) }}
  KEEP_INGRESS: {{ .Values.lcmConfig.useIngress | quote }}
  {{- end }}
  DISK_DAEMON_PLACEMENT_NODES_SELECTOR: {{ .Values.lcmConfig.diskDaemonNodeSelector | quote }}
  DISK_DAEMON_API_PORT: {{ .Values.lcmConfig.diskDaemonPortParameter | quote }}
  RGW_PUBLIC_ACCESS_SERVICE_SELECTOR: {{ .Values.lcmConfig.rgwPublicAccessServiceSelector | quote }}
{{- if (.Values.cephDeployment.enabled) }}
  DEPLOYMENT_CEPH_RELEASE: {{ .Values.cephRelease }}
  DEPLOYMENT_CEPH_IMAGE: {{ template "ceph.image" . }}
  DEPLOYMENT_ROOK_IMAGE: {{ printf "%s/%s:%s" .Values.global.dockerBaseUrl .Values.images.rook.repository .Values.images.rook.tag }}
  DEPLOYMENT_NETPOL_ENABLED: {{ .Values.cephDeployment.netpolEnabled | quote }}
  {{- if .Values.cephDeployment.installSharedNamespace }}
  DEPLOYMENT_OPENSTACK_CEPH_SHARED_NAMESPACE: {{ .Values.cephDeployment.openstackSharedNamespace }}
  {{- end }}
  {{- if (.Values.lcmConfig.cephDaemonsetLabelExclude) }}
  DEPLOYMENT_LABEL_TO_EXCLUDE_CEPH_DAEMONSETS: {{ .Values.lcmConfig.cephDaemonsetLabelExclude }}
  {{- end }}
  {{- if (.Values.cephDeployment.drainRequestLabelKey) }}
  DEPLOYMENT_DRAIN_REQUEST_LABEL_KEY: {{ .Values.cephDeployment.drainRequestLabelKey }}
  {{- end }}
  {{- if (.Values.cephDeployment.drainReadyLabelKey) }}
  DEPLOYMENT_DRAIN_READY_LABEL_KEY: {{ .Values.cephDeployment.drainReadyLabelKey }}
  {{- end }}
{{- end }}
{{- if .Values.global.namespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
{{ include "chart.labels" . | indent 4 }}
{{- end }}
