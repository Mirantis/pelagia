testSettings:
  namespace: ${TEST_NAMESPACE}
  caseSettings:
  - name: TestCephFS
    config:
      cephFsConfig: |-
        {
          "cephFilesystems": [
            {
              "name": "cephfs-store",
              "spec": {
                "dataPools": [{
                  "name": "cephfs-pool",
                  "failureDomain": "host",
                  "replicated": {"size": 2 }
                }],
                "metadataPool": {
                  "failureDomain": "host",
                  "replicated": {"size": 2 }
                },
                "metadataServer": {
                  "activeCount": 1,
                  "activeStandby": true
                }
              }
            },
            {
              "name": "test-fs-2",
              "spec": {
                "dataPools": [{
                  "name": "test-datapool",
                  "failureDomain": "host",
                  "replicated": {"size": 2 }
                }],
                "metadataPool": {
                  "failureDomain": "host",
                  "replicated": {"size": 2 }
                },
                "metadataServer": {"activeCount": 1 }
              }
            }
          ]
        }
testCases:
- TestCephFS
