testSettings:
  namespace: ${TEST_NAMESPACE}
  skipStoreState: true
  caseSettings:
  - name: TestDeployCephDeployment
    config:
      clusterNet: "11.12.0.0/24"
      publicNet: "11.12.1.0/24"
      monNodesLabel: "node.k0sproject.io/role=control-plane"
      osdNodesLabel: "node.k0sproject.io/role!=control-plane"
      defaultDevice: "vdb"
      tolerations: |
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
testCases:
- TestDeployCephDeployment
